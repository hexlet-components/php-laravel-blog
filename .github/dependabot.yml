---
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, automated, actions]
    groups:
      actions-minor-patch:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
      actions-major:
        patterns:
          - "*"
        update-types:
          - major
  # PHP dev
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, automated, dev]
    allow:
      - dependency-type: development
    groups:
      composer-dev-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
      composer-dev-major:
        patterns: ["*"]
        update-types: [major]
  # PHP prod
  - package-ecosystem: composer
    directory: /
    schedule:
      interval: weekly
    labels: [dependencies, automated, prod]
    allow:
      - dependency-type: production
    groups:
      composer-runtime-minor-patch:
        patterns: ["*"]
        update-types: [minor, patch]
